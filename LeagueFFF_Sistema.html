<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>League FFF – Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;
  --accent:#e94560;--gold:#f5a623;--blue:#2980b9;--green:#27ae60;--purple:#8e44ad;
  --text:#ecf0f1;--text2:#bdc3c7;--text3:#7f8c8d;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --card:#1e1e30;--card2:#252538;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:16px 12px 10px}
.sidebar-logo img{width:100%;border-radius:8px;display:block;margin-bottom:8px}
.sidebar-logo .logo-title{font-size:13px;font-weight:700;color:var(--accent);text-align:center}
.sidebar-logo .logo-sub{font-size:11px;color:var(--text3);text-align:center}
.sidebar-nav{padding:8px 0;flex:1}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;transition:background .15s,color .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.active{background:rgba(233,69,96,0.12);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-item .nav-icon{width:16px;text-align:center;font-size:15px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
#topbar{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h1{font-size:17px;font-weight:700}
#topbar .topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}
#content{padding:24px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:rgba(255,255,255,0.07)}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--card2);color:var(--text2);border:1px solid var(--border);cursor:pointer;font-size:14px}
.btn-icon:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
thead th{padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,0.03)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 12px;color:var(--text);vertical-align:middle}
.td-center{text-align:center}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(39,174,96,.18);color:#2ecc71}
.badge-red{background:rgba(231,76,60,.18);color:#e74c3c}
.badge-blue{background:rgba(41,128,185,.18);color:#3498db}
.badge-gray{background:rgba(127,140,141,.18);color:#95a5a6}
.badge-gold{background:rgba(245,166,35,.18);color:#f39c12}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:var(--text2);font-weight:600}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--bg2)}
.form-group textarea{resize:vertical;min-height:72px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.tabs{display:flex;gap:2px;background:var(--bg3);padding:4px;border-radius:var(--radius-sm);margin-bottom:20px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;transition:all .15s}
.tab.active{background:var(--accent);color:#fff;font-weight:700}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.pos-circle{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.pos-1{background:#f5a623;color:#000}.pos-2{background:#bdc3c7;color:#000}.pos-3{background:#cd7f32;color:#fff}.pos-other{background:var(--bg3);color:var(--text3)}
.game-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.game-score{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:700}
.game-score input{width:42px;text-align:center;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:14px;font-weight:700;padding:4px}
.game-vs{color:var(--text3);font-size:11px;font-weight:500}
.game-team{flex:1;font-size:13px;font-weight:600}
.jornada-hdr{background:linear-gradient(90deg,var(--blue),var(--purple));padding:10px 16px;border-radius:var(--radius-sm);margin-bottom:8px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.notif{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.notif.show{opacity:1}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-hdr h2{font-size:16px;font-weight:700}
.sync-indicator{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.offline-banner{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;color:#e74c3c;margin-bottom:12px;display:none}
</style>
</head>

</div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDocs, getDoc, setDoc, addDoc,
  updateDoc, deleteDoc, onSnapshot, query, orderBy, writeBatch, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase init ──
const firebaseConfig = {
  apiKey: "AIzaSyBnCtZt24Nt-fzRaKSq-gEyXD51lP22mnk",
  authDomain: "league-fff.firebaseapp.com",
  projectId: "league-fff",
  storageBucket: "league-fff.firebasestorage.app",
  messagingSenderId: "300447658812",
  appId: "1:300447658812:web:b469c26f4445624c6ca439"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── Colecciones ──
const COL = {
  config:    () => doc(db, 'liga', 'config'),
  equipos:   () => collection(db, 'equipos'),
  jugadores: () => collection(db, 'jugadores'),
  partidos:  () => collection(db, 'partidos'),
  pagos:     () => collection(db, 'pagos')
};

// ── Cache local (para renders rápidos) ──
var DB = {
  config:{liga:'Fremont Osos FFF',temporada:'2025',campos:['Field A','Field B','Field C','Field D','Field E'],
    ptsVictoria:3,ptsEmpate:1,ptsDerrota:0,duracionPartido:80,horaInicioSab:'08:00',horaInicioDom:'08:00',
    inscripcion:150,pagoParcial:75,moneda:'USD',equiposMax:50,formato:'Round Robin',fechaInicio:'2025-05-03'},
  equipos:[], jugadores:[], partidos:[], pagos:[]
};

// ── Utilities ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function fmt(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'—'; }
function fmtShort(d){ return d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}):'—'; }

function notify(msg,type){
  const n=document.getElementById('notif');
  n.textContent=msg;
  n.style.background=type==='error'?'#e74c3c':type==='warning'?'#f39c12':'#27ae60';
  n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2800);
}
function openModal(html){ document.getElementById('modal-inner').innerHTML=html; document.getElementById('modal').style.display='flex'; }
function closeModal(){ document.getElementById('modal').style.display='none'; }

// ── Real-time listeners ──
function startListeners(){
  // Config
  onSnapshot(COL.config(), snap => {
    if(snap.exists()){ DB.config = {...DB.config, ...snap.data()}; }
    document.getElementById('sb-league-name').textContent = DB.config.liga||'League FFF';
    document.getElementById('sb-season').textContent = 'Temporada '+(DB.config.temporada||'2025');
    if(currentPage==='config') renderConfig();
    if(currentPage==='dashboard') renderDashboard();
  });
  // Equipos
  onSnapshot(query(COL.equipos(), orderBy('nombre')), snap => {
    DB.equipos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='equipos') renderEquipos();
    if(currentPage==='dashboard') renderDashboard();
    if(currentPage==='standings') renderStandings();
    if(currentPage==='pagos') renderPagos();
  });
  // Jugadores
  onSnapshot(query(COL.jugadores(), orderBy('nombre')), snap => {
    DB.jugadores = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='jugadores') renderJugadores();
    if(currentPage==='goleadores') renderGoleadores();
    if(currentPage==='dashboard') renderDashboard();
  });
  // Partidos
  onSnapshot(query(COL.partidos(), orderBy('jornada')), snap => {
    DB.partidos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='calendario') renderCalendario();
    if(currentPage==='standings') renderStandings();
    if(currentPage==='dashboard') renderDashboard();
  });
  // Pagos
  onSnapshot(query(COL.pagos(), orderBy('fecha')), snap => {
    DB.pagos = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(currentPage==='pagos') renderPagos();
    if(currentPage==='dashboard') renderDashboard();
  });
}

// ── NAVIGATION ──
let currentPage = 'dashboard';
const pageTitles = {
  dashboard:['Dashboard','Resumen general de la liga'],
  equipos:['Equipos','Registro y gestión de equipos'],
  jugadores:['Jugadores','Registro de jugadores por equipo'],
  calendario:['Calendario','Jornadas y resultados'],
  standings:['Tabla de Posiciones','Clasificación automática'],
  goleadores:['Tabla de Goleadores','Estadísticas individuales'],
  pagos:['Control de Pagos','Inscripciones y pagos'],
  config:['Configuración','Parámetros de la liga']
};
window.nav = function(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{ if(n.getAttribute('onclick')===`nav('${page}')`) n.classList.add('active'); });
  const [title,sub]=pageTitles[page]||[page,''];
  document.getElementById('topbar-title').textContent=title;
  document.getElementById('topbar-sub').textContent=sub;
  document.getElementById('topbar-actions').innerHTML='';
  const renders={dashboard:renderDashboard,equipos:renderEquipos,jugadores:renderJugadores,
    calendario:renderCalendario,standings:renderStandings,goleadores:renderGoleadores,
    pagos:renderPagos,config:renderConfig};
  (renders[page]||renderDashboard)();
};

// ── HELPERS ──
function getEquipo(id){ return DB.equipos.find(e=>e.id===id); }
function getJugadoresByEquipo(eId){ return DB.jugadores.filter(j=>j.equipoId===eId); }

function calcStandings(){
  const s={};
  DB.equipos.forEach(e=>{ s[e.id]={id:e.id,nombre:e.nombre,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  DB.partidos.forEach(p=>{
    const gl=p.golLocal, gv=p.golVisit;
    if(gl===''||gl===null||gl===undefined) return;
    if(gv===''||gv===null||gv===undefined) return;
    const l=parseInt(gl)||0, v=parseInt(gv)||0;
    if(!s[p.localId]||!s[p.visitId]) return;
    s[p.localId].pj++; s[p.visitId].pj++;
    s[p.localId].gf+=l; s[p.localId].gc+=v;
    s[p.visitId].gf+=v; s[p.visitId].gc+=l;
    const cfg=DB.config;
    if(l>v){ s[p.localId].pg++; s[p.localId].pts+=cfg.ptsVictoria; s[p.visitId].pp++; s[p.visitId].pts+=cfg.ptsDerrota; }
    else if(l<v){ s[p.visitId].pg++; s[p.visitId].pts+=cfg.ptsVictoria; s[p.localId].pp++; s[p.localId].pts+=cfg.ptsDerrota; }
    else{ s[p.localId].pe++; s[p.localId].pts+=cfg.ptsEmpate; s[p.visitId].pe++; s[p.visitId].pts+=cfg.ptsEmpate; }
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
}

// ── DASHBOARD ──
function renderDashboard(){
  const st=calcStandings();
  const jugados=DB.partidos.filter(p=>p.golLocal!==''&&p.golLocal!==null&&p.golLocal!==undefined).length;
  const pendientes=DB.partidos.length-jugados;
  const totalCobrado=DB.pagos.filter(p=>p.estado==='Pagado').reduce((s,p)=>s+(p.monto||0),0);
  const totalEsperado=DB.equipos.length*(DB.config.inscripcion||150);
  const pct=totalEsperado>0?Math.round(totalCobrado/totalEsperado*100):0;
  const topRows=st.slice(0,5).map((e,i)=>`<tr>
    <td><span class="pos-circle pos-${i<3?i+1:'other'}">${i+1}</span></td>
    <td style="font-weight:600">${esc(e.nombre)}</td>
    <td class="td-center">${e.pj}</td>
    <td class="td-center" style="font-weight:700;color:var(--gold)">${e.pts}</td>
    <td class="td-center">${e.gf-e.gc>0?'+':''}${e.gf-e.gc}</td>
  </tr>`).join('');
  const recientes=DB.partidos.filter(p=>p.golLocal!==''&&p.golLocal!==null&&p.golLocal!==undefined).slice(-5).reverse()
    .map(p=>`<div class="game-card">
      <span class="game-team" style="text-align:right">${esc(getEquipo(p.localId)?.nombre||'?')}</span>
      <span class="game-score">${p.golLocal}<span class="game-vs">–</span>${p.golVisit}</span>
      <span class="game-team">${esc(getEquipo(p.visitId)?.nombre||'?')}</span>
    </div>`).join('')||'<div style="padding:16px;text-align:center;color:var(--text3)">Sin resultados aún</div>';
  const proximos=DB.partidos.filter(p=>p.golLocal===''||p.golLocal===null||p.golLocal===undefined).slice(0,5)
    .map(p=>`<div class="game-card">
      <div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">${fmtShort(p.fecha)} · J${p.jornada} · ${p.campo}</div>
      <div style="font-weight:600">${esc(getEquipo(p.localId)?.nombre||'?')} <span style="color:var(--text3)">vs</span> ${esc(getEquipo(p.visitId)?.nombre||'?')}</div></div>
      <span class="badge badge-blue">${p.hora}</span>
    </div>`).join('')||'<div style="padding:16px;text-align:center;color:var(--text3)">Sin partidos programados</div>';
  document.getElementById('content').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Equipos</div><div class="kpi-val" style="color:var(--blue)">${DB.equipos.length}</div><div class="kpi-sub">de ${DB.config.equiposMax||50} máx</div></div>
      <div class="kpi"><div class="kpi-label">Jugadores</div><div class="kpi-val" style="color:var(--purple)">${DB.jugadores.length}</div></div>
      <div class="kpi"><div class="kpi-label">Partidos</div><div class="kpi-val" style="color:var(--accent)">${DB.partidos.length}</div><div class="kpi-sub">${jugados} jugados</div></div>
      <div class="kpi"><div class="kpi-label">Pendientes</div><div class="kpi-val" style="color:var(--gold)">${pendientes}</div></div>
      <div class="kpi"><div class="kpi-label">Recaudado</div><div class="kpi-val" style="color:var(--green)">${DB.config.moneda||'USD'}${totalCobrado.toLocaleString()}</div><div class="kpi-sub">de $${totalEsperado.toLocaleString()}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card"><div style="font-weight:700;margin-bottom:12px">🥇 Top 5 Standings</div>
        ${st.length?`<div class="table-wrap"><table><thead><tr><th>Pos</th><th>Equipo</th><th>PJ</th><th>Pts</th><th>Dif</th></tr></thead><tbody>${topRows}</tbody></table></div>`:'<div style="padding:20px;text-align:center;color:var(--text3)">Sin datos</div>'}
      </div>
      <div class="card"><div style="font-weight:700;margin-bottom:10px">⚽ Últimos resultados</div>${recientes}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><div style="font-weight:700;margin-bottom:10px">📅 Próximos partidos</div>${proximos}</div>
      <div class="card"><div style="font-weight:700;margin-bottom:14px">💰 Pagos</div>
        <div style="font-size:28px;font-weight:700;color:var(--green);margin-bottom:6px">${pct}%</div>
        <div class="progress" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--text3)">${DB.config.moneda||'USD'}${totalCobrado.toLocaleString()} / ${DB.config.moneda||'USD'}${totalEsperado.toLocaleString()}</div>
      </div>
    </div>`;
}

// ── EQUIPOS ──
function renderEquipos(){
  document.getElementById('topbar-actions').innerHTML=`<button class="btn btn-primary" onclick="modalNuevoEquipo()">+ Nuevo equipo</button>`;
  const q=(document.getElementById('eq-search')||{}).value||'';
  const items=DB.equipos.filter(e=>!q||e.nombre.toLowerCase().includes(q.toLowerCase()));
  const rows=items.map(e=>{
    const pago=DB.pagos.find(p=>p.equipoId===e.id);
    const pst=pago?.estado||'Sin pago';
    const pb=pst==='Pagado'?'badge-green':pst==='Parcial'?'badge-gold':'badge-red';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px"><span class="avatar">${(e.nombre||'?').substring(0,2).toUpperCase()}</span><div><div style="font-weight:600">${esc(e.nombre)}</div><div style="font-size:11px;color:var(--text3)">${esc(e.categoria||'Open')}</div></div></div></td>
      <td>${esc(e.entrenador||'—')}</td><td>${esc(e.telefono||'—')}</td>
      <td class="td-center">${getJugadoresByEquipo(e.id).length}</td>
      <td><span class="badge ${pb}">${pst}</span></td>
      <td><span class="badge ${e.activo!==false?'badge-green':'badge-gray'}">${e.activo!==false?'Activo':'Inactivo'}</span></td>

        <button class="btn-icon" onclick="modalEditarEquipo('${e.id}')">✏️</button>

      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div class="search-bar"><input id="eq-search" placeholder="Buscar equipo..." oninput="renderEquipos()" value="${esc(q)}">
      <button class="btn btn-secondary" onclick="modalImportEquipos()">📥 Importar lista</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Equipo</th><th>Entrenador</th><th>Teléfono</th><th>Jugadores</th><th>Pago</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">Sin equipos registrados</td></tr>'}</tbody>
    </table></div>
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">${items.length} equipo(s)</div>`;
}

function modalNuevoEquipo(){
  openModal(`<div class="modal-header"><span class="modal-title">🛡️ Nuevo Equipo</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Nombre *</label><input id="f-nombre" placeholder="Ej: Los Tigres FC"></div>

      <div class="form-group"><label>Categoría</label><select id="f-cat"><option>Open</option><option>Sub-20</option><option>Sub-18</option><option>Veteranos</option><option>Femenil</option></select></div>
      <div class="form-group"><label>Ciudad</label><input id="f-ciudad"></div>
      <div class="form-group"><label>Color</label><input id="f-color" type="color" value="#e94560"></div>
      <div class="form-group"><label>Notas</label><textarea id="f-notas"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarEquipo()">Guardar</button></div>`);
}

window.guardarEquipo = async function(editId){
  const nombre=document.getElementById('f-nombre').value.trim();
  if(!nombre){ notify('Nombre requerido','error'); return; }
  const data={nombre,entrenador:document.getElementById('f-entrenador').value,
    telefono:document.getElementById('f-tel').value,email:document.getElementById('f-email').value,
    categoria:document.getElementById('f-cat').value,ciudad:document.getElementById('f-ciudad').value,
    color:document.getElementById('f-color').value,notas:document.getElementById('f-notas').value,
    activo:true,fechaRegistro:new Date().toISOString()};
  try{
    if(!editId){ await addDoc(COL.equipos(), data); notify('Equipo registrado'); }
    else{ await updateDoc(doc(db,'equipos',editId), data); notify('Equipo actualizado'); }
    closeModal();
  }catch(e){ notify('Error: '+e.message,'error'); }
};

function modalEditarEquipo(id){
  const e=getEquipo(id); if(!e) return;
  openModal(`<div class="modal-header"><span class="modal-title">✏️ Editar Equipo</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Nombre *</label><input id="f-nombre" value="${esc(e.nombre)}"></div>
      <div class="form-group"><label>Entrenador</label><input id="f-entrenador" value="${esc(e.entrenador||'')}"></div>
      <div class="form-group"><label>Teléfono</label><input id="f-tel" value="${esc(e.telefono||'')}"></div>
      <div class="form-group"><label>Email</label><input id="f-email" value="${esc(e.email||'')}"></div>
      <div class="form-group"><label>Categoría</label><select id="f-cat">${['Open','Sub-20','Sub-18','Veteranos','Femenil'].map(c=>`<option${c===e.categoria?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label>Ciudad</label><input id="f-ciudad" value="${esc(e.ciudad||'')}"></div>
      <div class="form-group"><label>Color</label><input id="f-color" type="color" value="${e.color||'#e94560'}"></div>
      <div class="form-group"><label>Notas</label><textarea id="f-notas">${esc(e.notas||'')}</textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="guardarEquipo('${id}')">Guardar</button></div>`);
}

window.eliminarEquipo = async function(id){
  if(!confirm('¿Eliminar equipo y sus jugadores?')) return;
  const batch=writeBatch(db);
  batch.delete(doc(db,'equipos',id));
  DB.jugadores.filter(j=>j.equipoId===id).forEach(j=>batch.delete(doc(db,'jugadores',j.id)));
  try{ await batch.commit(); notify('Equipo eliminado'); }catch(e){ notify('Error','error'); }
};

function modalImportEquipos(){
  openModal(`<div class="modal-header"><span class="modal-title">📥 Importar equipos</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">Un nombre por línea:</p>
    <textarea id="f-import" style="width:100%;height:180px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:10px;font-size:13px" placeholder="Los Tigres FC, Los Leones..."></textarea>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="importarEquipos()">Importar</button></div>`);
}

window.importarEquipos = async function(){
  const lines=document.getElementById('f-import').value.split(/[\n,]+/).map(l=>l.trim()).filter(Boolean);
  const batch=writeBatch(db);
  let count=0;
  lines.forEach(nombre=>{
    if(!DB.equipos.find(e=>e.nombre.toLowerCase()===nombre.toLowerCase())){
      batch.set(doc(COL.equipos()), {nombre,activo:true,fechaRegistro:new Date().toISOString()});
      count++;
    }
  });
  try{ await batch.commit(); closeModal(); notify(`${count} equipo(s) importados`); }
  catch(e){ notify('Error','error'); }
};

      </select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Jugador</th><th>#</th><th>Equipo</th><th>Posición</th><th>Goles</th><th>Asist.</th><th>Tarjetas</th><th>Acciones</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text3)">Sin jugadores</td></tr>'}</tbody>

// Debounced score update to avoid too many writes
const scoreTimers={};
window.updateScore = function(id, gl, gv){
  clearTimeout(scoreTimers[id]);
  scoreTimers[id]=setTimeout(async()=>{
    const p=DB.partidos.find(x=>x.id===id); if(!p) return;
    const newGl=gl!==null?gl:p.golLocal;
    const newGv=gv!==null?gv:p.golVisit;
    const estado=(newGl!==''&&newGl!==null&&newGl!==undefined&&newGv!==''&&newGv!==null&&newGv!==undefined)?'Final':'Pendiente';
    try{ await updateDoc(doc(db,'partidos',id),{golLocal:newGl,golVisit:newGv,estado}); }
    catch(e){ notify('Error guardando resultado','error'); }
  },600);
};

window.generateCalendar = async function(){
  const equipos=DB.equipos.map(e=>e.id);
  if(equipos.length<2){ notify('Necesitas al menos 2 equipos','warning'); return; }
  const n=equipos.length%2===0?equipos.length:equipos.length+1;
  const teams=[...equipos];
  if(equipos.length%2!==0) teams.push(null);
  const rounds=[];
  for(let r=0;r<n-1;r++){
    const round=[];
    for(let j=0;j<n/2;j++){ if(teams[j]&&teams[n-1-j]) round.push({local:teams[j],visit:teams[n-1-j]}); }
    rounds.push(round);
    teams.splice(1,0,teams.pop());
  }
  const start=new Date(DB.config.fechaInicio+'T12:00:00');
  const gameDates=[]; let d=new Date(start);
  while(gameDates.length<rounds.length){ if(d.getDay()===6||d.getDay()===0) gameDates.push(new Date(d)); d.setDate(d.getDate()+1); }
  const campos=DB.config.campos||['Field A','Field B','Field C'];
  // Delete existing partidos
  const batch=writeBatch(db);
  DB.partidos.forEach(p=>batch.delete(doc(db,'partidos',p.id)));
  await batch.commit();
  // Add new partidos in batches of 499
  let partidos=[];
  rounds.forEach((round,ri)=>{
    const fecha=gameDates[ri];
    round.forEach((g,gi)=>{
      const [hh,mm]=(fecha.getDay()===0?DB.config.horaInicioDom:DB.config.horaInicioSab||'08:00').split(':').map(Number);
      const totalMin=hh*60+mm+gi*90;
      const hora=`${String(Math.floor(totalMin/60)).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
      partidos.push({jornada:ri+1,fecha:fecha.toISOString().split('T')[0],
        localId:g.local,visitId:g.visit,campo:campos[gi%campos.length],hora,
        golLocal:'',golVisit:'',estado:'Pendiente'});
    });
  });
  // Write in chunks
  for(let i=0;i<partidos.length;i+=400){
    const b=writeBatch(db);
    partidos.slice(i,i+400).forEach(p=>b.set(doc(COL.partidos()),p));
    await b.commit();
  }
  notify(`Calendario generado: ${partidos.length} partidos`);
};

      <div class="form-group"><label>Método</label><select id="f-metodo"><option>Efectivo</option><option>Transferencia</option><option>Venmo</option><option>Zelle</option><option>PayPal</option></select></div>
      <div class="form-group"><label>Estado</label><select id="f-estado"><option>Pagado</option><option>Parcial</option><option>Pendiente</option></select></div>
      <div class="form-group"><label>Referencia</label><input id="f-ref" placeholder="# referencia o nota"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-green" onclick="guardarPago()">Confirmar pago</button></div>`);
};

window.guardarPago = async function(){
  const equipoId=document.getElementById('f-equipo').value;
  if(!equipoId){ notify('Selecciona un equipo','error'); return; }
  try{
    await addDoc(COL.pagos(),{equipoId,monto:parseFloat(document.getElementById('f-monto').value)||0,
      fecha:document.getElementById('f-fecha').value,metodo:document.getElementById('f-metodo').value,
      estado:document.getElementById('f-estado').value,ref:document.getElementById('f-ref').value});
    closeModal(); notify('Pago registrado');
  }catch(e){ notify('Error','error'); }
};

window.verHistorialPagos = function(eqId){
  const e=getEquipo(eqId); if(!e) return;
  const pagos=DB.pagos.filter(p=>p.equipoId===eqId);
  const rows=pagos.map(p=>`<tr>
    <td>${fmt(p.fecha)}</td><td style="color:var(--green);font-weight:600">${DB.config.moneda||'USD'}${p.monto}</td>
    <td>${esc(p.metodo||'—')}</td>
    <td><span class="badge ${p.estado==='Pagado'?'badge-green':p.estado==='Parcial'?'badge-gold':'badge-red'}">${p.estado}</span></td>
    <td>${esc(p.ref||'—')}</td>
    <td><button class="btn-icon btn-sm" onclick="eliminarPago('${p.id}')">🗑️</button></td>
  </tr>`).join('');
  openModal(`<div class="modal-header"><span class="modal-title">📋 ${esc(e.nombre)}</span><button class="btn-icon" onclick="closeModal()">✕</button></div>
    <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Monto</th><th>Método</th><th>Estado</th><th>Ref</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3)">Sin pagos</td></tr>'}</tbody></table></div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal();modalNuevoPago('${eqId}')">+ Agregar pago</button></div>`);
};

window.eliminarPago = async function(id){
  if(!confirm('¿Eliminar este pago?')) return;
  try{ await deleteDoc(doc(db,'pagos',id)); notify('Pago eliminado'); closeModal(); }
  catch(e){ notify('Error','error'); }
};

// ── CONFIG ──
function renderConfig(){
  const c=DB.config;
  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><div style="font-weight:700;margin-bottom:16px">🏆 Datos de la Liga</div>
        <div class="form-grid">
          <div class="form-group" style="grid-column:1/-1"><label>Nombre de la liga</label><input id="cfg-liga" value="${esc(c.liga||'')}"></div>
          <div class="form-group"><label>Temporada</label><input id="cfg-temporada" value="${esc(c.temporada||'')}"></div>
          <div class="form-group"><label>Formato</label><select id="cfg-formato"><option${c.formato==='Round Robin'?' selected':''}>Round Robin</option><option${c.formato==='Grupos + Playoffs'?' selected':''}>Grupos + Playoffs</option></select></div>
          <div class="form-group"><label>Máx. equipos</label><input id="cfg-maxeq" type="number" value="${c.equiposMax||50}"></div>
          <div class="form-group"><label>Fecha inicio</label><input id="cfg-fechainicio" type="date" value="${c.fechaInicio||''}"></div>
          <div class="form-group"><label>Moneda</label><select id="cfg-moneda"><option${c.moneda==='USD'?' selected':''}>USD</option><option${c.moneda==='MXN'?' selected':''}>MXN</option></select></div>
        </div>
      </div>
      <div class="card"><div style="font-weight:700;margin-bottom:16px">⚽ Puntuación</div>
        <div class="form-grid">
          <div class="form-group"><label>Pts. Victoria</label><input id="cfg-ptsv" type="number" value="${c.ptsVictoria||3}"></div>
          <div class="form-group"><label>Pts. Empate</label><input id="cfg-ptse" type="number" value="${c.ptsEmpate||1}"></div>
          <div class="form-group"><label>Pts. Derrota</label><input id="cfg-ptsd" type="number" value="${c.ptsDerrota||0}"></div>
          <div class="form-group"><label>Duración (min)</label><input id="cfg-dur" type="number" value="${c.duracionPartido||80}"></div>
          <div class="form-group"><label>Hora inicio Sáb</label><input id="cfg-hrsab" type="time" value="${c.horaInicioSab||'08:00'}"></div>
          <div class="form-group"><label>Hora inicio Dom</label><input id="cfg-hrdom" type="time" value="${c.horaInicioDom||'08:00'}"></div>
        </div>
      </div>
      <div class="card"><div style="font-weight:700;margin-bottom:16px">💰 Finanzas</div>
        <div class="form-grid">
          <div class="form-group"><label>Inscripción por equipo</label><input id="cfg-inscripcion" type="number" value="${c.inscripcion||150}"></div>
          <div class="form-group"><label>Pago parcial</label><input id="cfg-parcial" type="number" value="${c.pagoParcial||75}"></div>
        </div>
      </div>
      <div class="card"><div style="font-weight:700;margin-bottom:16px">🏟️ Campos</div>
        <div id="campos-list">
          ${(c.campos||[]).map((camp,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px">
            <input value="${esc(camp)}" oninput="updateCampoLocal(${i},this.value)" style="flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px">
            <button class="btn-icon" onclick="quitarCampo(${i})" style="color:#e74c3c">✕</button>
          </div>`).join('')}
        </div>
        <button class="btn btn-secondary btn-sm" style="margin-top:6px" onclick="agregarCampo()">+ Agregar campo</button>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="guardarConfig()">💾 Guardar configuración</button>
    </div>`;
}

window.updateCampoLocal = function(i,v){ DB.config.campos[i]=v; };
window.quitarCampo = function(i){ DB.config.campos.splice(i,1); renderConfig(); };
window.agregarCampo = function(){ DB.config.campos.push('Nuevo campo'); renderConfig(); };

window.guardarConfig = async function(){
  const cfg={
    liga:document.getElementById('cfg-liga').value,
    temporada:document.getElementById('cfg-temporada').value,
    formato:document.getElementById('cfg-formato').value,
    equiposMax:parseInt(document.getElementById('cfg-maxeq').value)||50,
    fechaInicio:document.getElementById('cfg-fechainicio').value,
    moneda:document.getElementById('cfg-moneda').value,
    ptsVictoria:parseInt(document.getElementById('cfg-ptsv').value)||3,
    ptsEmpate:parseInt(document.getElementById('cfg-ptse').value)||1,
    ptsDerrota:parseInt(document.getElementById('cfg-ptsd').value)||0,
    duracionPartido:parseInt(document.getElementById('cfg-dur').value)||80,
    horaInicioSab:document.getElementById('cfg-hrsab').value,
    horaInicioDom:document.getElementById('cfg-hrdom').value,
    inscripcion:parseFloat(document.getElementById('cfg-inscripcion').value)||150,
    pagoParcial:parseFloat(document.getElementById('cfg-parcial').value)||75,
    campos:DB.config.campos
  };
  try{
    await setDoc(COL.config(), cfg);
    notify('Configuración guardada');
  }catch(e){ notify('Error: '+e.message,'error'); }
};

// ── INIT ──
startListeners();
nav('dashboard');

// Expose functions needed by inline onclick handlers
window.modalNuevoEquipo=modalNuevoEquipo;
window.modalEditarEquipo=modalEditarEquipo;
window.modalImportEquipos=modalImportEquipos;
window.renderEquipos=renderEquipos;
window.modalNuevoJugador=modalNuevoJugador;
window.modalEditarJugador=modalEditarJugador;
window.renderJugadores=renderJugadores;
window.renderCalendario=renderCalendario;
window.closeModal=closeModal;
window.openModal=openModal;
</script>
</body>
</html>
